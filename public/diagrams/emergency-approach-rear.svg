<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" role="img" aria-labelledby="t d">
  <title id="t">Emergency vehicle approaches from behind — pull right, let it pass</title>
  <desc id="d">A two-lane road heading upward. An ambulance with blue flashing lights is behind a blue car; the blue car has pulled to the right edge of its lane to make room. Green arrow shows the sidestep motion.</desc>
  <rect width="400" height="400" fill="#0f172a"/>
  <rect x="60" y="0" width="280" height="400" fill="#475569"/>
  <g stroke="#e2e8f0" stroke-width="3" stroke-dasharray="12 10" fill="none">
    <line x1="200" y1="0" x2="200" y2="400"/>
  </g>
  <rect x="55" y="0" width="6" height="400" fill="#f8fafc"/>
  <rect x="339" y="0" width="6" height="400" fill="#f8fafc"/>
  <!-- ambulance from behind -->
  <g transform="translate(170 280)">
    <rect x="0" y="0" width="60" height="80" rx="8" fill="#f8fafc" stroke="#1e293b" stroke-width="2"/>
    <rect x="0" y="0" width="60" height="20" fill="#1e293b"/>
    <!-- red cross -->
    <rect x="25" y="34" width="10" height="30" fill="#dc2626"/>
    <rect x="15" y="44" width="30" height="10" fill="#dc2626"/>
    <!-- blue lights -->
    <circle cx="15" cy="-6" r="7" fill="#3b82f6" stroke="#1e40af" stroke-width="1.5"/>
    <circle cx="45" cy="-6" r="7" fill="#3b82f6" stroke="#1e40af" stroke-width="1.5"/>
    <polygon points="30,-8 22,2 38,2" fill="#fbbf24"/>
    <text x="30" y="16" text-anchor="middle" font-family="system-ui,sans-serif" font-weight="800" font-size="11" fill="#f8fafc">AMB</text>
  </g>
  <!-- blue car pulled right -->
  <g transform="translate(290 120)">
    <rect x="0" y="0" width="40" height="60" rx="8" fill="#2563eb" stroke="#1e3a8a" stroke-width="2"/>
    <rect x="6" y="8" width="28" height="14" fill="#bfdbfe"/>
    <rect x="6" y="38" width="28" height="14" fill="#bfdbfe"/>
    <polygon points="20,-6 12,6 28,6" fill="#fbbf24"/>
    <text x="20" y="34" text-anchor="middle" font-family="system-ui,sans-serif" font-weight="700" font-size="14" fill="#fff">YOU</text>
  </g>
  <!-- sidestep arrow (from centre-right lane to right edge) -->
  <g fill="none" stroke="#22c55e" stroke-width="4" stroke-linecap="round">
    <path d="M 240,160 Q 280,160 290,150"/>
    <polygon points="295,148 282,142 284,156" fill="#22c55e" stroke="none"/>
  </g>
  <!-- ambulance priority arrow -->
  <g fill="none" stroke="#fbbf24" stroke-width="5" stroke-linecap="round">
    <path d="M 200,275 L 200,80"/>
    <polygon points="200,68 190,86 210,86" fill="#fbbf24" stroke="none"/>
  </g>
  <text x="60" y="30" font-family="system-ui,sans-serif" font-weight="700" font-size="14" fill="#3b82f6">blue light + siren</text>
</svg>
