<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" role="img" aria-labelledby="t d">
  <title id="t">School bus stopped with hazard lights — pass at walking pace</title>
  <desc id="d">A yellow school bus stopped at the kerb with blinking hazard lights and two child pictograms beside it. A blue car approaches slowly with a walking-pace speed indicator.</desc>
  <rect width="400" height="400" fill="#0f172a"/>
  <rect x="0" y="140" width="400" height="220" fill="#475569"/>
  <!-- kerb -->
  <rect x="0" y="355" width="400" height="8" fill="#94a3b8"/>
  <rect x="0" y="363" width="400" height="37" fill="#1e293b"/>
  <!-- lane divider -->
  <g stroke="#e2e8f0" stroke-width="3" stroke-dasharray="12 10" fill="none">
    <line x1="0" y1="220" x2="400" y2="220"/>
  </g>
  <!-- yellow school bus stopped on right side -->
  <g transform="translate(220 230)">
    <rect x="0" y="0" width="160" height="120" rx="10" fill="#facc15" stroke="#854d0e" stroke-width="3"/>
    <!-- windows -->
    <rect x="10" y="16" width="24" height="32" fill="#bae6fd"/>
    <rect x="40" y="16" width="24" height="32" fill="#bae6fd"/>
    <rect x="70" y="16" width="24" height="32" fill="#bae6fd"/>
    <rect x="100" y="16" width="24" height="32" fill="#bae6fd"/>
    <rect x="130" y="16" width="24" height="32" fill="#bae6fd"/>
    <!-- door -->
    <rect x="130" y="54" width="24" height="50" fill="#ca8a04"/>
    <!-- hazard amber lights blinking -->
    <circle cx="10" cy="10" r="6" fill="#fde047" stroke="#854d0e" stroke-width="2"/>
    <circle cx="150" cy="10" r="6" fill="#fde047" stroke="#854d0e" stroke-width="2"/>
    <circle cx="10" cy="115" r="6" fill="#fde047" stroke="#854d0e" stroke-width="2"/>
    <circle cx="150" cy="115" r="6" fill="#fde047" stroke="#854d0e" stroke-width="2"/>
    <text x="80" y="90" text-anchor="middle" font-family="system-ui,sans-serif" font-weight="800" font-size="22" fill="#713f12">SCHOOL</text>
  </g>
  <!-- children pictograms at kerb -->
  <g transform="translate(240 340)" fill="#facc15" stroke="#713f12" stroke-width="1.5">
    <circle cx="0" cy="0" r="7"/>
    <path d="M-7,8 L-5,22 L-2,22 L0,12 L2,22 L5,22 L7,8 Z" fill="#facc15"/>
  </g>
  <g transform="translate(265 342)" fill="#facc15" stroke="#713f12" stroke-width="1.5">
    <circle cx="0" cy="0" r="6"/>
    <path d="M-6,7 L-4,20 L-2,20 L0,11 L2,20 L4,20 L6,7 Z" fill="#facc15"/>
  </g>
  <!-- blue car approaching in left lane -->
  <g transform="translate(30 170)">
    <rect x="0" y="0" width="60" height="40" rx="8" fill="#2563eb" stroke="#1e3a8a" stroke-width="2"/>
    <rect x="8" y="6" width="14" height="28" fill="#bfdbfe"/>
    <rect x="38" y="6" width="14" height="28" fill="#bfdbfe"/>
    <polygon points="66,20 54,12 54,28" fill="#fbbf24"/>
    <text x="30" y="24" text-anchor="middle" font-family="system-ui,sans-serif" font-weight="700" font-size="13" fill="#fff">YOU</text>
  </g>
  <!-- walking-pace indicator -->
  <g transform="translate(130 190)">
    <rect x="0" y="-14" width="70" height="28" rx="4" fill="#1e293b" stroke="#22c55e" stroke-width="2"/>
    <text x="35" y="5" text-anchor="middle" font-family="system-ui,sans-serif" font-weight="700" font-size="12" fill="#22c55e">~5 km/h</text>
  </g>
  <!-- slow arrow -->
  <g fill="none" stroke="#22c55e" stroke-width="4" stroke-linecap="round">
    <path d="M 100,190 L 210,190" stroke-dasharray="6 6"/>
    <polygon points="218,190 206,184 206,196" fill="#22c55e" stroke="none"/>
  </g>
</svg>
