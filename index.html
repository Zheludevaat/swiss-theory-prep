<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <!-- F-4 (partial): point iOS at the existing 192px icon. iOS scales
         smoothly to 180/167/152; a per-size variant pipeline can land
         later when we have a proper raster asset story. -->
    <link rel="apple-touch-icon" sizes="192x192" href="./icons/icon-192.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0f172a" />
    <!-- F-9: pair the apple-prefixed flag with the standard one so non-iOS
         browsers (Edge mobile, Samsung Internet, Chrome on Android in
         standalone mode) also honour the install hint. -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="TheoryPrep" />
    <title>Swiss Theory Prep</title>
  </head>
  <body class="bg-slate-950 text-slate-100 antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
