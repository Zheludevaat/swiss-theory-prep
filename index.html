<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <!-- F-4/F-5: per-device apple-touch-icon variants. iOS picks the
         best match from the declared sizes, so the home-screen icon stays
         crisp on Retina iPads and Pro Max iPhones alike. The 180 link is
         declared without a `sizes` attribute so older iOS versions that
         ignore the size hint still pick the highest-resolution PNG. -->
    <link rel="apple-touch-icon" href="./icons/apple-touch-icon-180.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="./icons/apple-touch-icon-180.png" />
    <link rel="apple-touch-icon" sizes="167x167" href="./icons/apple-touch-icon-167.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="./icons/apple-touch-icon-152.png" />
    <!-- F-5: iOS startup splash screens. Three common iPhone resolutions —
         SE (3rd gen), 14/15, and 14/15 Pro Max. iOS matches by
         device-width / device-height / -webkit-device-pixel-ratio. -->
    <link rel="apple-touch-startup-image" href="./splash/apple-splash-750x1334.png"
          media="(device-width: 375px) and (device-height: 667px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)" />
    <link rel="apple-touch-startup-image" href="./splash/apple-splash-1170x2532.png"
          media="(device-width: 390px) and (device-height: 844px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" />
    <link rel="apple-touch-startup-image" href="./splash/apple-splash-1290x2796.png"
          media="(device-width: 430px) and (device-height: 932px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0f172a" />
    <!-- F-9: pair the apple-prefixed flag with the standard one so non-iOS
         browsers (Edge mobile, Samsung Internet, Chrome on Android in
         standalone mode) also honour the install hint. -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="TheoryPrep" />
    <title>Swiss Theory Prep</title>
  </head>
  <body class="bg-slate-950 text-slate-100 antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
